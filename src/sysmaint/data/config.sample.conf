# Sample sysmaint configuration. Copy to /etc/sysmaint/sysmaint.conf and edit.
# `sudo sysmaint install` generates this for you interactively.
#
# Permissions:
#   /etc/sysmaint/sysmaint.conf   root:root 0640
#   /etc/sysmaint/smtp_password   root:root 0600

[email]
from = your-noreply@gmail.com
to = you@example.com
smtp_server = smtp.gmail.com
smtp_port = 587
password_file = /etc/sysmaint/smtp_password

[update]
# Auto-reboot after upgrade if /var/run/reboot-required exists AND current
# time is within [reboot_window_start, reboot_window_end). When false, the
# email just flags REBOOT REQUIRED and you reboot manually.
auto_reboot = false
reboot_window_start = 03:00
reboot_window_end = 05:00

# dist-upgrade is a superset of upgrade (handles new dependencies). Recommended
# for home-lab / server boxes where you want the box current. Set false on
# boxes where dist-upgrade has historically caused regressions.
include_dist_upgrade = true

[notify]
# Always sends on failure or reboot-required. These toggle the "clean" paths.
on_success = true
on_no_changes = false

[monitor]
# Mounts at or above this percent trigger an ALERT line in the email.
disk_threshold_percent = 85

# Comma-separated systemd services to report status for.
services = sshd,postfix
